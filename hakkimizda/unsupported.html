<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex">
  <title>Not Supported</title>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-J7TMDT4F8N"></script>
  <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-J7TMDT4F8N');
  </script>

  <style>
    @font-face {
      font-family: "nbarchitekt";
      src: url('./assets/fonts/NBArchitektStd-Regular-export/NBArchitektStd-Regular.woff2') format('woff2'),
        url('./assets/fonts/NBArchitektStd-Regular-export/NBArchitektStd-Regular.woff') format('woff'),
        url('./assets/fonts/NBArchitektStd-Regular-export/NBArchitektStd-Regular.otf') format('opentype');
      font-style: normal;
      font-weight: 400;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      height: 100%;
      font-family: "nbarchitekt", Helvetica, Arial, sans-serif;
    }

    body {
      background-image: url('./assets/images/unsupported-bg.jpg');
      background-size: cover;
      background-repeat: no-repeat;
      background-position: 50% 50%;
    }

    h1 {
      margin: 0;
      padding: 0;
      font-size: 18px;
      text-align: center;
      opacity: 0.8;
      padding-top: 25vh;
    }

    .fade-in {
	opacity: 1;
	animation-name: fadeInOpacity;
	animation-iteration-count: 1;
	animation-timing-function: ease-in;
	animation-duration: 2s;
}

@keyframes fadeInOpacity {
	0% {
		opacity: 0;
	}
	100% {
		opacity: 1;
	}
}
  </style>
</head>
<body>
  <h1 class="fade-in">Your browser is not supported</h1>
</body>
</html>
